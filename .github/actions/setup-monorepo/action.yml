name: Setup monorepo
description: Install pnpm dependencies and configure Turbo cache. Requires checkout first.

inputs:
  turbo-token:
    description: Turbo remote cache token.
    required: false
    default: ""
  turbo-team:
    description: Turbo team slug.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.12.1

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Configure Turbo cache
      shell: bash
      run: |
        if [ -n "${{ inputs.turbo-token }}" ] && [ -n "${{ inputs.turbo-team }}" ]; then
          echo "TURBO_CACHE=remote:rw" >> "$GITHUB_ENV"
        else
          echo "TURBO_CACHE=local" >> "$GITHUB_ENV"
        fi
        echo "TURBO_TELEMETRY_DISABLED=1" >> "$GITHUB_ENV"
        echo "NEXT_TELEMETRY_DISABLED=1" >> "$GITHUB_ENV"
