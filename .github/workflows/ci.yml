name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  NODE_ENV: test
  # Shard counts are literal in job env/matrix (GitHub Actions cannot use env context in services/job env).
  # Int: 8 shards (~OOM-safe). E2E: 4 shards. Tune matrix + VITEST_SHARD/PLAYWRIGHT_SHARD together.

jobs:
  set-turbo-filter:
    runs-on: ubuntu-latest
    outputs:
      repo_filter: ${{ steps.filter.outputs.repo_filter }}
    steps:
      - name: Set Turbo package filter
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "repo_filter=@repo/*...[origin/${{ github.base_ref }}]" >> "$GITHUB_OUTPUT"
          else
            echo "repo_filter=@repo/*" >> "$GITHUB_OUTPUT"
          fi

  quality:
    runs-on: ubuntu-latest
    needs: set-turbo-filter
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Fetch base branch for affected filter
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Lint + typecheck (Turbo)
        run: pnpm turbo run lint check-types --filter="${{ needs.set-turbo-filter.outputs.repo_filter }}"

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Run atnd-me unit tests (Turbo)
        run: pnpm ci:atnd-me:unit

  package-tests:
    runs-on: ubuntu-latest
    needs: set-turbo-filter
    strategy:
      fail-fast: false
      matrix:
        package:
          - auth-plugin
          - bookings-plugin
          - bookings-next
          - bookings-payments
          - payments-plugin
          - memberships
          - integration-testing
          - plugin-clearable-tenant
          - shared-services
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_SERVER_URL: ${{ github.server_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Fetch base branch for affected filter
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}"

      - name: Run package tests (Turbo)
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILTER="@repo/${{ matrix.package }}...[origin/${{ github.base_ref }}]"
          else
            FILTER="@repo/${{ matrix.package }}"
          fi
          pnpm turbo run test --filter="$FILTER"
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

  atnd-me-db:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/e2e_atnd_me
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'test-secret-key-for-ci-builds-only' }}
      CI: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: brugrappling
          POSTGRES_DB: e2e_atnd_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 2; done

      - name: Prepare database (Turbo)
        run: pnpm ci:atnd-me:db

      - name: Dump database for test shards
        env:
          PGPASSWORD: brugrappling
        run: pg_dump -h localhost -U postgres -d e2e_atnd_me -F c -f atnd-me-db.dump

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: atnd-me-db
          path: atnd-me-db.dump
          retention-days: 1

  int-tests:
    needs: atnd-me-db
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    env:
      DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/e2e_atnd_me
      PAYLOAD_SECRET: test-secret-key-for-ci-builds-only
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_1234567890' }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_1234567890' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_1234567890' }}
      PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY: ${{ secrets.PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY || 'true' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'resend_api_key_1234567890' }}
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CI: true
      FORCE_EXISTING_DB: true
      VITEST_SHARD: ${{ matrix.shard }}/8
      NODE_OPTIONS: --no-deprecation --max-old-space-size=6144
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: brugrappling
          POSTGRES_DB: e2e_atnd_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 2; done

      - name: Download database artifact
        uses: actions/download-artifact@v4
        with:
          name: atnd-me-db

      - name: Restore database
        env:
          PGPASSWORD: brugrappling
        run: pg_restore -h localhost -U postgres -d e2e_atnd_me --no-owner --no-acl atnd-me-db.dump

      - name: Run integration tests shard ${{ matrix.shard }}/8 (Turbo)
        run: pnpm ci:atnd-me:int

  e2e-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/e2e_atnd_me
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'test-secret-key-for-ci-builds-only' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_1234567890' }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_1234567890' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_1234567890' }}
      PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY: ${{ secrets.PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY || 'true' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'resend_api_key_1234567890' }}
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CI: true
      E2E_USE_PROD: "true"
      # Normal `.next` + `next start` in e2e-tests (standalone pnpm traces break sharp/react).
      E2E_DISABLE_STANDALONE: "true"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: brugrappling
          POSTGRES_DB: e2e_atnd_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 2; done

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/atnd-me/.next/cache
          key: ${{ runner.os }}-nextjs-atnd-me-${{ hashFiles('pnpm-lock.yaml', 'apps/atnd-me/package.json', 'apps/atnd-me/next.config.*', 'apps/atnd-me/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-atnd-me-

      - name: Build atnd-me for E2E (Turbo)
        run: |
          set +e
          pnpm ci:atnd-me:build
          build_status=$?
          if [ $build_status -ne 0 ]; then
            echo "Build failed. Clearing .next cache and retrying once."
            rm -rf apps/atnd-me/.next
            pnpm ci:atnd-me:build
            build_status=$?
          fi
          exit $build_status

      - name: Prepare Next.js build artifact
        run: |
          test -d apps/atnd-me/.next/static
          test -d apps/atnd-me/.next/server
          test -f apps/atnd-me/.next/BUILD_ID
          rm -rf /tmp/atnd-me-next-artifact
          mkdir -p /tmp/atnd-me-next-artifact
          # Full server build for `next start` (exclude cache to keep artifact small).
          rsync -a --exclude cache apps/atnd-me/.next/ /tmp/atnd-me-next-artifact/

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-atnd-me
          path: /tmp/atnd-me-next-artifact
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1
          compression-level: 1

  e2e-tests:
    needs: [e2e-build, atnd-me-db]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/e2e_atnd_me
      PAYLOAD_SECRET: test-secret-key-for-ci-builds-only
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_1234567890' }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_1234567890' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_1234567890' }}
      PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY: ${{ secrets.PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY || 'true' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'resend_api_key_1234567890' }}
      ENABLE_TEST_MAGIC_LINKS: "true"
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CI: true
      E2E_USE_PROD: "true"
      E2E_USE_NEXT_START: "true"
      E2E_DISABLE_STANDALONE: "true"
      PW_E2E_SKIP_WEBSERVER_MIGRATE: "true"
      PW_E2E_MAX_FAILURES: "0"
      PW_E2E_SKIP_DEFAULT_TENANT_DATA: "true"
      PLAYWRIGHT_SHARD: ${{ matrix.shard }}/4
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: brugrappling
          POSTGRES_DB: e2e_atnd_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-monorepo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Download Next.js build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build-atnd-me
          path: apps/atnd-me/.next

      - name: Verify Next.js build artifact
        run: |
          test -d apps/atnd-me/.next/static
          test -d apps/atnd-me/.next/server
          test -f apps/atnd-me/.next/BUILD_ID

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 2; done

      - name: Download database artifact
        uses: actions/download-artifact@v4
        with:
          name: atnd-me-db

      - name: Restore database
        env:
          PGPASSWORD: brugrappling
        run: pg_restore -h localhost -U postgres -d e2e_atnd_me --no-owner --no-acl atnd-me-db.dump

      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps
        working-directory: apps/atnd-me

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install
        working-directory: apps/atnd-me

      - name: Run E2E tests shard ${{ matrix.shard }}/4 (Turbo)
        run: pnpm ci:atnd-me:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-atnd-me-${{ matrix.shard }}
          path: apps/atnd-me/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-atnd-me-${{ matrix.shard }}
          path: apps/atnd-me/test-results/
          retention-days: 30
          if-no-files-found: ignore
