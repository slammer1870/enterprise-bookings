name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      # Use remote cache when secrets exist (internal PRs/main), otherwise fall back (fork PRs).
      TURBO_CACHE: ${{ (secrets.TURBO_TOKEN != '' && vars.TURBO_TEAM != '') && 'remote:rw' || 'local' }}
      TURBO_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + typecheck (Turbo)
        # Limit to shared workspace packages; app linting is enforced in their own jobs (e2e/build)
        # and some apps use Next's lint rules that currently fail in CI.
        run: pnpm turbo run lint check-types --filter="@repo/*"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - auth-plugin
          - bookings-plugin
          - bookings-payments
          - payments-plugin
          - memberships
          - integration-testing
    env:
      # Remove DATABASE_URI to allow packages to create their own test databases
      # DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/${{ matrix.app.db }}
      STRIPE_SECRET_KEY: ${{secrets.STRIPE_SECRET_KEY}}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: ${{ (secrets.TURBO_TOKEN != '' && vars.TURBO_TEAM != '') && 'remote:rw' || 'local' }}
      TURBO_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SERVER_URL: ${{ github.server_url }}
      NODE_ENV: test

    # Remove PostgreSQL service since packages will create their own databases
    # services:
    #   postgres:
    #     image: postgres:latest
    #     env:
    #       POSTGRES_HOST: localhost
    #       POSTGRES_PORT: 5432
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: brugrappling
    #       POSTGRES_DB: ${{ matrix.app.db }}
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd "pg_isready -U postgres"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      # Build outputs are already cached by Turbo artifacts
      # - name: Restore build outputs
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       packages/testing-config/dist
      #       packages/ui/dist
      #     key: ${{ runner.os }}-build-outputs-test-${{ matrix.package }}-${{ hashFiles('**/package.json') }}
      #     restore-keys: |
      #       ${{ runner.os }}-build-outputs-
      #       ${{ runner.os }}-build-outputs-test-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Remove PostgreSQL wait since packages handle their own databases
      # - name: Wait for PostgreSQL to be ready
      #   run: |
      #     echo "Waiting for PostgreSQL to be ready..."
      #     until pg_isready -h localhost -p 5432 -U postgres; do
      #       echo "Postgres is unavailable - sleeping"
      #       sleep 5
      #     done
      #     echo "Postgres is up!"

      - name: Setup Docker for TestContainers
        run: |
          # Ensure Docker daemon is running for TestContainers
          sudo systemctl start docker
          # Add the runner user to the docker group
          sudo usermod -aG docker $USER

      - name: Run tests for ${{ matrix.package }} package
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter "@repo/${{ matrix.package }}" test | tee pnpm-test.log
          if grep -q "No projects matched the filters" pnpm-test.log; then
            echo "ERROR: No workspace matched filter @repo/${{ matrix.package }} (check package name / workspace config)."
            exit 1
          fi
        env:
          # Ensure TestContainers can access Docker
          DOCKER_HOST: unix:///var/run/docker.sock

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: atnd-me
            db: e2e_atnd_me
            app_path: apps/atnd-me
    env:
      DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/${{ matrix.app.db }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'test-secret-key-for-ci-builds-only' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_1234567890' }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || 'pk_test_1234567890' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_1234567890' }}
      PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY: ${{ secrets.PAYLOAD_PUBLIC_STRIPE_IS_TEST_KEY || 'true' }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'resend_api_key_1234567890' }}
      ENABLE_TEST_MAGIC_LINKS: "true"
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_CACHE: ${{ (secrets.TURBO_TOKEN != '' && vars.TURBO_TEAM != '') && 'remote:rw' || 'local' }}
      TURBO_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NODE_ENV: test
      CI: true

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: brugrappling
          POSTGRES_DB: ${{ matrix.app.db }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Postgres is unavailable - sleeping"
            sleep 5
          done
          echo "Postgres is up!"

      - name: Run database migrations for ${{ matrix.app.name }}
        env:
          DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/${{ matrix.app.db }}
          PAYLOAD_SECRET: test-secret-key-for-ci-builds-only
          NODE_ENV: test
          CI: true
        run: |
          pnpm run payload migrate:fresh --force-accept-warning
          sleep 2  # Give migrations time to fully complete
        working-directory: ${{ matrix.app.app_path }}

      - name: Cache Next.js build cache (${{ matrix.app.name }})
        id: next-cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.app.app_path }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.app.name }}-${{ hashFiles('pnpm-lock.yaml', format('{0}/package.json', matrix.app.app_path), format('{0}/next.config.*', matrix.app.app_path), format('{0}/src/**', matrix.app.app_path)) }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.app.name }}-

      - name: Install Playwright OS dependencies
        run: pnpm exec playwright install-deps
        working-directory: ${{ matrix.app.app_path }}

      - name: Install Playwright Browsers (only if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install
        working-directory: ${{ matrix.app.app_path }}

      - name: Run Integration tests for ${{ matrix.app.name }}
        env:
          DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/${{ matrix.app.db }}
          PAYLOAD_SECRET: test-secret-key-for-ci-builds-only
          NODE_ENV: test
          CI: true
          FORCE_EXISTING_DB: true
        run: pnpm test:int
        working-directory: ${{ matrix.app.app_path }}

      - name: Build ${{ matrix.app.name }} for E2E (production build)
        run: |
          set +e
          pnpm run build
          build_status=$?
          if [ $build_status -ne 0 ]; then
            echo "Build failed. Clearing .next cache and retrying once to recover from possible cache corruption."
            rm -rf .next
            pnpm run build
            build_status=$?
          fi
          exit $build_status
        working-directory: ${{ matrix.app.app_path }}
        env:
          E2E_USE_PROD: "true"

      # Int tests mutate the shared DB; reset once here so Playwright can start the server without
      # running migrate:fresh again in webServer (PW_E2E_SKIP_WEBSERVER_MIGRATE).
      - name: Reset database for E2E (${{ matrix.app.name }})
        env:
          DATABASE_URI: postgres://postgres:brugrappling@localhost:5432/${{ matrix.app.db }}
          PAYLOAD_SECRET: test-secret-key-for-ci-builds-only
          NODE_ENV: test
          CI: true
        run: |
          pnpm run payload migrate:fresh --force-accept-warning
          sleep 2
        working-directory: ${{ matrix.app.app_path }}

      - name: Run E2E tests for ${{ matrix.app.name }}
        run: pnpm run test:e2e:ci
        working-directory: ${{ matrix.app.app_path }}
        env:
          E2E_USE_PROD: "true"
          PW_E2E_SKIP_WEBSERVER_MIGRATE: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.app.name }}
          path: ${{ matrix.app.app_path }}/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-${{ matrix.app.name }}
          path: ${{ matrix.app.app_path }}/test-results/
          retention-days: 30
